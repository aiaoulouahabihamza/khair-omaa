<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>خير أمة - القرآن الكريم</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="../variables.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <header class="main-header" id="mainHeader">
        <div class="header-content">
            <a href="../index.html" class="back-btn" aria-label="رجوع">
                <i class="fa-solid fa-arrow-right"></i>
            </a>
            <div class="header-title">
                <h1>
                    <span class="header-icon">
                        <i class="fa-solid fa-book-open"></i>
                    </span>
                    <span class="header-text">القرآن الكريم</span>
                </h1>
            </div>
            <button class="header-btn theme-toggle" id="themeToggle" aria-label="تبديل الوضع">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="search-section">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن سورة..." autocomplete="off" />
                <button class="search-clear" id="searchClear" aria-label="مسح البحث">
                    <i class="fa-solid fa-circle-xmark"></i>
                </button>
            </div>
        </div>

        <div class="riwayah-note" id="statsBar">
            <i class="fa-solid fa-feather-pointed"></i>
            <span>القرآن الكريم برواية ورش عن نافع — الرسم والضبط المغربي</span>
        </div>

        <div class="loading-state" id="loadingState">
            <div class="loading-spinner">
                <i class="fa-solid fa-spinner spin"></i>
            </div>
            <span class="loading-text">جاري تحميل القرآن...</span>
        </div>

        <div class="surah-list" id="surahList"></div>

        <div class="no-results" id="noResults" style="display:none;">
            <i class="fa-solid fa-magnifying-glass no-results-icon"></i>
            <p class="no-results-text">لا توجد نتائج للبحث</p>
            <button class="no-results-btn" id="clearSearchBtn">عرض جميع السور</button>
        </div>
    </main>

    <nav class="bottom-nav" id="bottomNav">
        <a href="../index.html" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>الرئيسية</span>
        </a>
        <a href="#" class="nav-item" id="lastReadBtn">
            <i class="fa-regular fa-bookmark"></i>
            <span>آخر قراءة</span>
        </a>
        <a href="#" class="nav-item" id="favoritesBtn">
            <i class="fa-regular fa-heart"></i>
            <span>المفضلة</span>
        </a>
        <a href="#" class="nav-item" id="settingsBtn">
            <i class="fa-solid fa-gear"></i>
            <span>الإعدادات</span>
        </a>
    </nav>

    <script src="main.js"></script>
</body>
</html>
